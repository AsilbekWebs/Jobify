<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobify — Ish Topish Platformasi</title>
    <style>
        /* Oddiy boshlang'ich dizayn (buni keyin neon yoki cyberpunk uslubida bezatasizlar) */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f9; }
        navbar { display: flex; justify-content: space-between; padding: 15px 30px; background: #333; color: white; }
        navbar a { color: white; text-decoration: none; margin-left: 15px; }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .btn { background: #007bff; color: white; padding: 10px 15px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <navbar>
        <div class="logo">
            <a href="/"><strong>JOBIFY</strong></a>
        </div>
        <div class="menu">
            <a href="/">Vakansiyalar</a>
            {% if request.user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Shaxsiy Kabinet</a>
                <a href="{% url 'logout' %}" style="color: #ff4d4d;">Chiqish</a>
            {% else %}
                <a href="{% url 'login' %}">Kirish</a>
                <a href="{% url 'register_candidate' %}">Ro'yxatdan o'tish</a>
            {% endif %}
        </div>
    </navbar>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
